[project]
name = "route-bulletproof"
authors = ["Route Bulletproof Team"]
description = "A smart contract for generating and trading unique route-based geometric NFTs"
telemetry = false
requirements = []
[contracts.bulletproof-generator]
path = "contracts/bulletproof-generator.clar"
depends_on = []

[repl]
costs_version = 2
parser_version = 2

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false
